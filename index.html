<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private AI Hub - Entrance</title>
    <style>
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; }
        body { 
            margin: 0; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: #000 url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564') no-repeat center center / cover; 
            overflow: hidden; color: white;
        }
        
        .title { font-size: 32px; font-weight: 600; margin-bottom: 40px; letter-spacing: 1px; text-shadow: 0 4px 15px rgba(0,0,0,0.3); }

        .user-grid { display: flex; gap: 30px; }
        
        .user-card {
            width: 140px; height: 160px; border-radius: 24px;
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            text-decoration: none; color: white;
        }
        
        .user-card:hover { transform: translateY(-10px) scale(1.05); background: rgba(255, 255, 255, 0.2); box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4); border-color: rgba(255, 255, 255, 0.3); }
        .avatar { width: 60px; height: 60px; border-radius: 50%; margin-bottom: 15px; display: flex; justify-content: center; align-items: center; font-size: 26px; font-weight: bold; text-shadow: 0 2px 4px rgba(0,0,0,0.2); }
        .name { font-size: 16px; font-weight: 500; }
        
        /* 专属色彩定制 */
        #card-jack .avatar { background: linear-gradient(135deg, #007AFF, #5AC8FA); }
        #card-mae .avatar { background: linear-gradient(135deg, #34C759, #30D158); }
        #card-aaliyah .avatar { background: linear-gradient(135deg, #AF52DE, #BF5AF2); }
    </style>
</head>
<body>
    <div class="title">Who is chatting?</div>
    <div class="user-grid">
        <a href="./jack/index.html" class="user-card" id="card-jack">
            <div class="avatar">J</div>
            <div class="name">Jack</div>
        </a>
        <a href="./mae/index.html" class="user-card" id="card-mae">
            <div class="avatar">M</div>
            <div class="name">Mae</div>
        </a>
        <a href="./aaliyah/index.html" class="user-card" id="card-aaliyah">
            <div class="avatar">A</div>
            <div class="name">Aaliyah</div>
        </a>
    </div>
</body>
</html>
