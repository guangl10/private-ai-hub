<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aaliyah · Private AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --accent: #8B5CF6;
            --accent-bright: #A78BFA;
            --accent-mid: #C4B5FD;
            --bg: #0D0A1A;
            --bubble-user: #7C3AED;
            --sidebar-w: 270px;
        }
        * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
        body { font-family:'Nunito',sans-serif; height:100dvh; background:var(--bg); overflow:hidden; color:#f5f3ff; }

        .bg-canvas { position:fixed; inset:0; z-index:0; background: radial-gradient(ellipse 75% 60% at 25% 10%, rgba(139,92,246,0.35) 0%, transparent 60%), radial-gradient(ellipse 55% 50% at 80% 85%, rgba(167,139,250,0.2) 0%, transparent 55%), radial-gradient(ellipse 40% 35% at 50% 50%, rgba(196,181,253,0.08) 0%, transparent 50%), linear-gradient(150deg, #0D0A1A 0%, #130D26 50%, #0D0A1A 100%); }
        .bg-stars { position:fixed; inset:0; z-index:0; }
        .star { position:absolute; border-radius:50%; background:white; animation:twinkle var(--d) ease-in-out infinite; }
        @keyframes twinkle { 0%,100%{opacity:0.1;} 50%{opacity:var(--op);} }

        #app { position:relative; z-index:1; height:100dvh; display:flex; }

        #sidebar { width:var(--sidebar-w); height:100%; background:rgba(13,10,26,0.9); backdrop-filter:blur(30px); border-right:1px solid rgba(139,92,246,0.25); display:flex; flex-direction:column; flex-shrink:0; transition:transform 0.35s cubic-bezier(0.25,1,0.5,1); z-index:50; }
        #sidebar.collapsed { transform:translateX(calc(-1 * var(--sidebar-w))); position:absolute; }

        .sidebar-header { padding:20px 18px 14px; border-bottom:1px solid rgba(139,92,246,0.2); }
        .user-identity { display:flex; align-items:center; gap:12px; }
        .user-avatar { width:42px; height:42px; border-radius:50%; background:linear-gradient(135deg,#8B5CF6,#EC4899); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:18px; color:white; box-shadow:0 0 0 2px rgba(139,92,246,0.4),0 0 20px rgba(139,92,246,0.2); }
        .user-name { font-weight:800; font-size:17px; color:white; }
        .user-sub { font-size:11px; color:rgba(255,255,255,0.35); font-family:'JetBrains Mono',monospace; }

        .sidebar-section { padding:14px 12px 8px; }
        .sidebar-label { font-size:10px; font-weight:800; color:rgba(255,255,255,0.3); letter-spacing:0.12em; text-transform:uppercase; padding:0 6px 8px; }

        .mode-list { display:flex; flex-direction:column; gap:5px; }
        .mode-card { display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:14px; cursor:pointer; transition:all 0.2s; border:1px solid transparent; }
        .mode-card:hover { background:rgba(139,92,246,0.12); }
        .mode-card.active { background:rgba(139,92,246,0.22); border-color:rgba(139,92,246,0.45); }
        .mode-icon { width:34px; height:34px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; background:rgba(255,255,255,0.07); }
        .mode-card.active .mode-icon { background:rgba(139,92,246,0.3); }
        .mode-name { font-size:14px; font-weight:700; color:rgba(255,255,255,0.9); }
        .mode-desc { font-size:11px; color:rgba(255,255,255,0.35); }

        .context-row { display:flex; align-items:center; justify-content:space-between; padding:8px 6px; }
        .context-label { font-size:13px; color:rgba(255,255,255,0.5); }
        .context-val { font-size:12px; font-family:'JetBrains Mono',monospace; color:var(--accent-mid); }
        input[type="range"] { width:100%; accent-color:var(--accent); margin:4px 6px 0; height:3px; }

        .token-display { margin:6px 12px; padding:10px 12px; background:rgba(139,92,246,0.08); border:1px solid rgba(139,92,246,0.15); border-radius:12px; }
        .token-row { display:flex; justify-content:space-between; margin-bottom:3px; }
        .token-key { font-size:11px; color:rgba(255,255,255,0.3); }
        .token-num { font-size:12px; font-family:'JetBrains Mono',monospace; color:var(--accent-mid); }
        .token-cost { font-size:13px; font-weight:700; color:#A78BFA; text-align:right; }

        .model-section { padding:8px 12px; }
        .model-search { width:100%; padding:7px 10px; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); border-radius:10px; color:white; font-size:12px; font-family:'Nunito',sans-serif; outline:none; margin-bottom:6px; }
        .model-search::placeholder { color:rgba(255,255,255,0.3); }
        .model-list { max-height:150px; overflow-y:auto; display:flex; flex-direction:column; gap:2px; }
        .model-list::-webkit-scrollbar { width:3px; } .model-list::-webkit-scrollbar-thumb { background:rgba(139,92,246,0.4); border-radius:2px; }
        .model-tier { font-size:9px; font-weight:800; color:rgba(255,255,255,0.25); letter-spacing:0.1em; text-transform:uppercase; padding:6px 6px 2px; }
        .model-opt { padding:7px 10px; border-radius:8px; cursor:pointer; transition:background 0.15s; display:flex; justify-content:space-between; align-items:center; }
        .model-opt:hover { background:rgba(255,255,255,0.06); }
        .model-opt.selected { background:rgba(139,92,246,0.2); }
        .model-opt-name { font-size:12px; color:rgba(255,255,255,0.75); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:165px; }
        .model-opt-price { font-size:10px; font-family:'JetBrains Mono',monospace; color:rgba(255,255,255,0.3); flex-shrink:0; }
        .model-loading { font-size:11px; color:rgba(255,255,255,0.3); text-align:center; padding:12px; }

        .sidebar-actions { margin-top:auto; padding:12px; display:flex; flex-direction:column; gap:6px; border-top:1px solid rgba(139,92,246,0.15); }
        .action-btn { display:flex; align-items:center; gap:8px; padding:10px 12px; border-radius:12px; border:none; cursor:pointer; font-size:13px; font-family:'Nunito',sans-serif; font-weight:700; transition:all 0.2s; width:100%; text-align:left; }
        .btn-archive { background:rgba(52,199,89,0.12); color:#4ADE80; border:1px solid rgba(52,199,89,0.2); }
        .btn-archive:hover { background:rgba(52,199,89,0.22); }
        .btn-clear { background:rgba(255,59,48,0.1); color:#F87171; border:1px solid rgba(255,59,48,0.2); }
        .btn-clear:hover { background:rgba(255,59,48,0.18); }
        .btn-back { background:rgba(255,255,255,0.05); color:rgba(255,255,255,0.5); border:1px solid rgba(255,255,255,0.1); text-decoration:none; display:flex; align-items:center; gap:8px; }
        .btn-back:hover { color:rgba(255,255,255,0.8); background:rgba(255,255,255,0.08); }

        #main { flex:1; min-width:0; display:flex; flex-direction:column; }

        header { height:62px; display:flex; align-items:center; padding:0 16px; gap:12px; background:rgba(13,10,26,0.65); backdrop-filter:blur(20px); border-bottom:1px solid rgba(139,92,246,0.15); flex-shrink:0; }
        .toggle-btn { width:36px; height:36px; border-radius:12px; border:1px solid rgba(139,92,246,0.3); background:rgba(139,92,246,0.12); color:rgba(255,255,255,0.7); display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:16px; flex-shrink:0; transition:all 0.2s; }
        .toggle-btn:hover { background:rgba(139,92,246,0.25); color:white; }
        .header-mode { display:flex; align-items:center; gap:8px; padding:6px 14px; border-radius:20px; background:rgba(139,92,246,0.15); border:1px solid rgba(139,92,246,0.3); }
        .header-mode-icon { font-size:16px; }
        .header-mode-name { font-size:14px; font-weight:700; color:rgba(255,255,255,0.85); }
        .header-right { margin-left:auto; display:flex; align-items:center; gap:8px; }
        .tts-btn { width:32px; height:32px; border-radius:10px; border:1px solid rgba(255,255,255,0.1); background:transparent; color:rgba(255,255,255,0.4); cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center; transition:all 0.2s; }
        .tts-btn.active { background:rgba(139,92,246,0.2); color:#A78BFA; border-color:rgba(139,92,246,0.4); }

        #chat-flow { flex:1; overflow-y:auto; padding:20px 16px 12px; display:flex; flex-direction:column; gap:16px; scroll-behavior:smooth; }
        #chat-flow::-webkit-scrollbar { width:4px; }
        #chat-flow::-webkit-scrollbar-thumb { background:rgba(139,92,246,0.3); border-radius:2px; }

        .msg-row { display:flex; animation:msgIn 0.35s cubic-bezier(0.25,1,0.5,1) both; }
        .msg-row.user { justify-content:flex-end; }
        .msg-row.ai { justify-content:flex-start; }
        @keyframes msgIn { from{opacity:0;transform:translateY(12px) scale(0.97);} to{opacity:1;transform:translateY(0) scale(1);} }

        /* Slightly larger text for Aaliyah */
        .bubble { max-width:min(80%,580px); padding:13px 17px; border-radius:20px; font-size:16px; line-height:1.65; word-wrap:break-word; position:relative; }
        .msg-row.user .bubble { background:linear-gradient(135deg,#7C3AED,#8B5CF6); color:white; border-bottom-right-radius:5px; box-shadow:0 4px 20px rgba(139,92,246,0.4); }
        .msg-row.ai .bubble { background:rgba(255,255,255,0.09); backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,0.12); color:rgba(255,255,255,0.92); border-bottom-left-radius:5px; box-shadow:0 4px 16px rgba(0,0,0,0.25); }
        .bubble img { max-width:100%; border-radius:12px; margin-top:8px; }

        .bubble-controls { display:flex; gap:6px; margin-top:8px; opacity:0; transition:opacity 0.2s; }
        .msg-row.ai:hover .bubble-controls { opacity:1; }
        .ctrl-btn { padding:4px 10px; border-radius:8px; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.05); color:rgba(255,255,255,0.45); font-size:12px; cursor:pointer; transition:all 0.15s; font-family:'Nunito',sans-serif; font-weight:600; }
        .ctrl-btn:hover { background:rgba(139,92,246,0.2); color:white; border-color:rgba(139,92,246,0.4); }

        .bubble p{margin:0;}.bubble p+p{margin-top:8px;}
        .bubble h1,.bubble h2,.bubble h3{color:white;border-bottom:1px solid rgba(255,255,255,0.1);padding-bottom:4px;margin:12px 0 6px;font-size:16px;}
        .bubble ul,.bubble ol{padding-left:20px;margin:6px 0;}.bubble li{margin-bottom:4px;}
        .bubble code{font-family:'JetBrains Mono',monospace;font-size:13px;background:rgba(0,0,0,0.3);padding:2px 6px;border-radius:5px;}
        .bubble pre{background:rgba(0,0,0,0.3);border-radius:10px;padding:12px;overflow-x:auto;margin:8px 0;}
        .bubble pre code{background:none;padding:0;}
        .bubble table{border-collapse:collapse;width:100%;margin:8px 0;font-size:14px;display:block;overflow-x:auto;}
        .bubble th,.bubble td{border:1px solid rgba(255,255,255,0.1);padding:7px 11px;}
        .bubble th{background:rgba(139,92,246,0.2);}
        .bubble strong{color:#C4B5FD;}
        .streaming-cursor::after{content:'▋';animation:blink 0.8s step-end infinite;color:#A78BFA;}
        @keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}

        footer { padding:12px 16px; padding-bottom:max(14px,env(safe-area-inset-bottom)); background:rgba(13,10,26,0.8); backdrop-filter:blur(20px); border-top:1px solid rgba(139,92,246,0.15); flex-shrink:0; }
        .input-row { display:flex; gap:8px; align-items:flex-end; }
        .icon-btn { width:40px; height:40px; border-radius:12px; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.06); color:rgba(255,255,255,0.5); font-size:18px; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all 0.2s; flex-shrink:0; }
        .icon-btn:hover { background:rgba(139,92,246,0.2); color:white; border-color:rgba(139,92,246,0.35); }
        .icon-btn.recording { background:#EF4444; border-color:#EF4444; color:white; animation:pulse 1.2s ease infinite; }
        @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.5);}50%{box-shadow:0 0 0 8px rgba(239,68,68,0);}}
        #userInput { flex:1; min-width:0; padding:11px 16px; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.13); border-radius:16px; color:white; font-size:16px; font-family:'Nunito',sans-serif; font-weight:600; outline:none; resize:none; max-height:140px; min-height:40px; height:40px; line-height:1.5; overflow-y:hidden; transition:border-color 0.2s; }
        #userInput:focus { border-color:rgba(139,92,246,0.55); }
        #userInput::placeholder { color:rgba(255,255,255,0.25); font-weight:400; }
        .btn-send { width:40px; height:40px; border-radius:12px; border:none; background:linear-gradient(135deg,#7C3AED,#8B5CF6); color:white; font-size:18px; cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:all 0.2s; box-shadow:0 4px 14px rgba(139,92,246,0.45); }
        .btn-send:hover { transform:scale(1.08); box-shadow:0 6px 20px rgba(139,92,246,0.55); }
        .btn-send:disabled { opacity:0.35; transform:none; cursor:not-allowed; }
        input[type="file"] { display:none; }

        .doc-modal-overlay { position:fixed; inset:0; z-index:9999; background:rgba(0,0,0,0.88); backdrop-filter:blur(12px); display:flex; justify-content:center; align-items:flex-start; overflow-y:auto; }
        .doc-paper { background:#fff; color:#1a1a1a; width:90%; max-width:820px; margin:60px auto; min-height:calc(100vh - 120px); padding:8% 10%; box-shadow:0 25px 60px rgba(0,0,0,0.6); border-radius:4px; font-family:ui-serif,Georgia,serif; line-height:1.85; font-size:17px; position:relative; }
        .doc-paper * { color:inherit; } .doc-paper p{margin-bottom:1.2em;text-align:justify;}
        .doc-paper h1,.doc-paper h2,.doc-paper h3{color:#000!important;border-bottom:1px solid #eee;padding-bottom:6px;margin-top:1.6em;font-family:ui-sans-serif,system-ui,sans-serif;}
        .doc-paper table{width:100%;border-collapse:collapse;margin:1.5em 0;font-size:14px;}
        .doc-paper th,.doc-paper td{border:1px solid #d1d5db!important;padding:10px 14px!important;background:#fff!important;color:#1a1a1a!important;}
        .doc-paper th{background:#f9fafb!important;font-weight:700;}
        @media print{body *{visibility:hidden;}.doc-paper,.doc-paper *{visibility:visible;}.doc-paper{position:absolute;left:0;top:0;margin:0;padding:0;box-shadow:none;width:100%;max-width:100%;}.no-print{display:none!important;}}

        .sidebar-overlay { display:none; position:fixed; inset:0; z-index:40; background:rgba(0,0,0,0.45); }
        .sidebar-overlay.visible { display:block; }

        /* ── Responsive ── */
        @media (max-width: 900px) {
            :root { --sidebar-w: 280px; }
            #sidebar { position: absolute; height: 100%; }
        }
        @media (max-width: 640px) {
            :root { --sidebar-w: 85vw; }
            #sidebar { position: absolute; height: 100%; max-width: 320px; }
            .bubble { max-width: 90%; font-size: 15px; padding: 11px 14px; }
            header { padding: 0 10px; gap: 8px; height: 54px; }
            .header-mode { padding: 5px 10px; }
            .header-mode-name { font-size: 13px; }
            footer { padding: 8px 10px; padding-bottom: max(10px, env(safe-area-inset-bottom)); }
            .input-row { gap: 6px; }
            .icon-btn { width: 36px; height: 36px; font-size: 16px; }
            .btn-send { width: 36px; height: 36px; font-size: 16px; }
            #userInput { font-size: 15px; padding: 9px 13px; min-height: 36px; height: 36px; }
            #chat-flow { padding: 14px 12px 10px; gap: 12px; }
            .model-list { max-height: 120px; }
            .token-display { margin: 4px 10px; padding: 8px 10px; }
        }
        @media (max-width: 360px) {
            .bubble { max-width: 95%; font-size: 14px; }
            .header-mode-name { display: none; }
        }
        @media (min-width: 1200px) {
            #chat-flow { padding: 24px 10% 16px; }
        }
        @media (max-height: 500px) {
            header { height: 48px; }
            #chat-flow { padding: 8px 14px; gap: 8px; }
            footer { padding: 6px 12px; padding-bottom: max(6px, env(safe-area-inset-bottom)); }
            .bubble { font-size: 14px; padding: 9px 12px; }
            .sidebar-section { padding: 8px 10px 4px; }
            .mode-card { padding: 7px 10px; }
            .model-list { max-height: 80px; }
            .token-display { display: none; }
        }
    </style>
</head>
<body>
<div class="bg-canvas"></div>
<div class="bg-stars" id="bgStars"></div>

<div id="app">
    <div id="sidebar">
        <div class="sidebar-header">
            <div class="user-identity">
                <div class="user-avatar">A</div>
                <div>
                    <div class="user-name">Aaliyah ✨</div>
                    <div class="user-sub">private · ai · hub</div>
                </div>
            </div>
        </div>
        <div class="sidebar-section">
            <div class="sidebar-label">模式</div>
            <div class="mode-list" id="modeList"></div>
        </div>
        <div class="sidebar-section">
            <div class="sidebar-label">上下文深度</div>
            <div class="context-row">
                <span class="context-label">保留轮次</span>
                <span class="context-val" id="ctxVal">5</span>
            </div>
            <input type="range" min="2" max="20" value="5" id="ctxSlider" oninput="updateCtx(this.value)">
        </div>
        <div class="token-display">
            <div class="token-row"><span class="token-key">本次 tokens</span><span class="token-num" id="tokSession">0</span></div>
            <div class="token-row"><span class="token-key">累计消耗</span><span class="token-num" id="tokTotal">0</span></div>
            <div class="token-cost" id="costDisplay">≈ $0.0000</div>
        </div>
        <div class="model-section">
            <div class="sidebar-label" style="padding:0 0 6px;">模型</div>
            <input type="text" class="model-search" id="modelSearch" placeholder="搜索模型..." oninput="filterModels(this.value)">
            <div class="model-list" id="modelList"><div class="model-loading">加载中...</div></div>
        </div>
        <div class="sidebar-actions">
            <button class="action-btn btn-archive" onclick="archiveMD()">📦 归档对话</button>
            <button class="action-btn btn-clear" onclick="clearChat()">🗑️ 清空对话</button>
            <a href="../index.html" class="action-btn btn-back">← 返回大门</a>
        </div>
    </div>
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
    <div id="main">
        <header>
            <button class="toggle-btn" onclick="toggleSidebar()">☰</button>
            <div class="header-mode" id="headerMode"><span class="header-mode-icon">📚</span><span class="header-mode-name">作业帮手模式</span></div>
            <div class="header-right"></div>
        </header>
        <div id="chat-flow"></div>
        <footer>
            <div class="input-row">
                <button class="icon-btn" onclick="document.getElementById('imageInput').click()" title="上传图片">📎</button>
                <input type="file" id="imageInput" accept="image/*" onchange="handleImageUpload(event)">
                <button class="icon-btn" id="voiceBtn" onclick="toggleVoice()" title="语音输入">🎤</button>
                <textarea id="userInput" rows="1" placeholder="嗨！有什么想聊的吗？ 😊" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
                <button class="btn-send" id="sendBtn" onclick="sendMsg()">↑</button>
            </div>
        </footer>
    </div>
</div>

<script>
// Stars
(function(){const s=document.getElementById('bgStars');for(let i=0;i<60;i++){const el=document.createElement('div');el.className='star';const sz=Math.random()*2.5+0.5;el.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${(Math.random()*4+2).toFixed(1)}s;--op:${(Math.random()*0.6+0.2).toFixed(2)};animation-delay:${(Math.random()*5).toFixed(1)}s;`;s.appendChild(el);}})();

const currentUser='Aaliyah',ST_KEY='MEM_Aaliyah_ST',LT_KEY='MEM_Aaliyah_LT',API_KEY_STORE='OR_API_KEY',TOK_TOTAL_KEY='TOK_TOTAL_Aaliyah',LAST_MODEL_KEY='LAST_MODEL_Aaliyah';
const MODES=[
    {id:'homework',icon:'📚',name:'作业帮手',desc:'作业·题目·一步一步讲',prompt:'你是 Aaliyah 的作业小助手！用简单有趣的方式帮她理解题目，一步一步讲清楚，多鼓励她，用 emoji 让回答更生动活泼。不要直接给答案，引导她自己想出来！'},
    {id:'chat',icon:'🎮',name:'聊天玩耍',desc:'聊天·游戏·随便说说',prompt:'你是 Aaliyah 的好朋友！轻松愉快地聊天，可以一起玩文字游戏、猜谜语、说笑话。语气活泼有趣，用 emoji，让对话充满能量！✨'},
    {id:'study',icon:'🌟',name:'学习',desc:'知识·探索·有趣的世界',prompt:'你是 Aaliyah 的学习伙伴！把复杂的知识变成有趣的故事和例子，激发她的好奇心，鼓励她多问问题。知识是冒险，一起探索吧！🚀'},
    {id:'story',icon:'🌙',name:'故事时间',desc:'童话·冒险·创意故事',prompt:'你是一位神奇的说书人！给 Aaliyah 讲充满想象力的故事，可以是童话、冒险、科幻。故事生动有趣，充满惊喜转折，也可以让她参与决定故事走向！✨🌟'}
];
let currentMode=MODES[0],currentLimit=5,shortTermLog=JSON.parse(localStorage.getItem(ST_KEY)||'[]'),pendingImageBase64=null,allModels=[],selectedModelId=localStorage.getItem(LAST_MODEL_KEY)||'google/gemini-2.5-flash',sessionTokens=0,totalTokens=parseInt(localStorage.getItem(TOK_TOTAL_KEY)||'0'),isStreaming=false;

function init(){renderModes();loadModels();renderHistory();updateTokenDisplay();addBubble(`嗨，Aaliyah！✨\n我是你的专属 AI 小伙伴～\n现在是【${currentMode.name}】模式，有什么想聊的吗？😊`,'ai');}

let sidebarOpen=window.innerWidth>640;
function toggleSidebar(){sidebarOpen=!sidebarOpen;updateSidebarState();}
function closeSidebar(){sidebarOpen=false;updateSidebarState();}
function updateSidebarState(){const sb=document.getElementById('sidebar'),ov=document.getElementById('sidebarOverlay');if(sidebarOpen){sb.classList.remove('collapsed');if(window.innerWidth<=640)ov.classList.add('visible');}else{sb.classList.add('collapsed');ov.classList.remove('visible');}}
if(window.innerWidth<=640){document.getElementById('sidebar').classList.add('collapsed');sidebarOpen=false;}

function renderModes(){const list=document.getElementById('modeList');list.innerHTML='';MODES.forEach(mode=>{const card=document.createElement('div');card.className='mode-card'+(mode.id===currentMode.id?' active':'');card.innerHTML=`<div class="mode-icon">${mode.icon}</div><div class="mode-info"><div class="mode-name">${mode.name}</div><div class="mode-desc">${mode.desc}</div></div>`;card.onclick=()=>setMode(mode);list.appendChild(card);});}
function setMode(mode){currentMode=mode;renderModes();document.getElementById('headerMode').innerHTML=`<span class="header-mode-icon">${mode.icon}</span><span class="header-mode-name">${mode.name}模式</span>`;if(window.innerWidth<=640)closeSidebar();}

async function loadModels(){const apiKey=getApiKey(false);if(!apiKey){renderFallbackModels();return;}try{const res=await fetch('https://openrouter.ai/api/v1/models',{headers:{'Authorization':`Bearer ${apiKey}`}});const data=await res.json();if(!data.data){renderFallbackModels();return;}allModels=data.data.filter(m=>m.pricing&&m.id).map(m=>{const price=parseFloat(m.pricing.prompt||0)*1e6;let tier=price===0?'free':price<0.5?'cheap':price<3?'mid':'premium';return{id:m.id,name:m.name||m.id,price,tier};}).sort((a,b)=>a.price-b.price);renderModelList(allModels);}catch(e){renderFallbackModels();}}
function renderFallbackModels(){allModels=[{id:'google/gemini-2.5-flash',name:'Gemini 2.5 Flash',price:0.15,tier:'cheap'},{id:'google/gemini-2.0-flash-001',name:'Gemini 2.0 Flash',price:0.1,tier:'cheap'},{id:'anthropic/claude-3.5-haiku',name:'Claude 3.5 Haiku',price:0.8,tier:'cheap'},{id:'openai/gpt-4o-mini',name:'GPT-4o Mini',price:0.15,tier:'cheap'},{id:'meta-llama/llama-3.3-70b-instruct',name:'Llama 3.3 70B',price:0.12,tier:'cheap'},{id:'anthropic/claude-sonnet-4-5',name:'Claude Sonnet 4.5',price:3,tier:'mid'},{id:'openai/gpt-4o',name:'GPT-4o',price:2.5,tier:'mid'}];renderModelList(allModels);}
function renderModelList(models){const list=document.getElementById('modelList');list.innerHTML='';const tiers=[{key:'free',label:'免费'},{key:'cheap',label:'经济'},{key:'mid',label:'旗舰'},{key:'premium',label:'顶级'}];tiers.forEach(({key,label})=>{const group=models.filter(m=>m.tier===key);if(!group.length)return;const te=document.createElement('div');te.className='model-tier';te.textContent=label;list.appendChild(te);group.slice(0,15).forEach(m=>{const opt=document.createElement('div');opt.className='model-opt'+(m.id===selectedModelId?' selected':'');opt.dataset.id=m.id;const ps=m.price===0?'free':`$${m.price.toFixed(2)}/M`;opt.innerHTML=`<span class="model-opt-name">${m.name}</span><span class="model-opt-price">${ps}</span>`;opt.onclick=()=>selectModel(m.id);list.appendChild(opt);});});}
function filterModels(q){const f=q?allModels.filter(m=>m.name.toLowerCase().includes(q.toLowerCase())||m.id.toLowerCase().includes(q.toLowerCase())):allModels;renderModelList(f);}
function selectModel(id){selectedModelId=id;localStorage.setItem(LAST_MODEL_KEY,id);document.querySelectorAll('.model-opt').forEach(el=>el.classList.toggle('selected',el.dataset.id===id));}
function updateCtx(val){currentLimit=parseInt(val);document.getElementById('ctxVal').textContent=val;}
function updateTokenDisplay(d=0){sessionTokens+=d;totalTokens+=d;localStorage.setItem(TOK_TOTAL_KEY,totalTokens);document.getElementById('tokSession').textContent=sessionTokens.toLocaleString();document.getElementById('tokTotal').textContent=totalTokens.toLocaleString();const model=allModels.find(m=>m.id===selectedModelId);const cost=(totalTokens/1e6)*(model?model.price:0.15);document.getElementById('costDisplay').textContent=`≈ $${cost.toFixed(4)}`;}

function addBubble(text,role,imageBase64=null,streaming=false){const flow=document.getElementById('chat-flow');const row=document.createElement('div');row.className=`msg-row ${role}`;const bubble=document.createElement('div');bubble.className='bubble';if(imageBase64){const img=document.createElement('img');img.src=imageBase64;bubble.appendChild(img);}const cd=document.createElement('div');if(role==='ai'&&!streaming){cd.innerHTML=marked.parse(text||'');}else{cd.textContent=text||'';}if(streaming)cd.classList.add('streaming-cursor');bubble.appendChild(cd);if(role==='ai'&&!streaming){const ctrl=document.createElement('div');ctrl.className='bubble-controls';ctrl.innerHTML=`<button class="ctrl-btn" onclick="regenerateLast()">↺ 再说一次</button><button class="ctrl-btn" onclick="openDocView(this)">📄 阅读视图</button>`;bubble.appendChild(ctrl);bubble._rawText=text;}row.appendChild(bubble);flow.appendChild(row);flow.scrollTop=flow.scrollHeight;return{row,bubble,contentDiv:cd};}
function renderHistory(){shortTermLog.slice(-(currentLimit*2)).forEach(m=>addBubble(m.content,m.role,m.image));}
function getApiKey(p=true){let k=sessionStorage.getItem(API_KEY_STORE)||localStorage.getItem(API_KEY_STORE);if(!k&&p){k=prompt(`嗨！需要输入 API Key 才能开始哦～`);if(k){sessionStorage.setItem(API_KEY_STORE,k.trim());localStorage.setItem(API_KEY_STORE,k.trim());}}return k;}
function getRelevantMemory(t){const lt=localStorage.getItem(LT_KEY)||'';if(!lt)return'';const secs=lt.split(/(?=###)/);const kws=t.toLowerCase().split(/\s+/).filter(w=>w.length>2);const rel=secs.filter(s=>kws.some(kw=>s.toLowerCase().includes(kw)));return(rel.length>0?rel.slice(0,3):secs.slice(-2)).join('\n').slice(0,1500);}

async function sendMsg(){const input=document.getElementById('userInput');const text=input.value.trim();const apiKey=getApiKey();if((!text&&!pendingImageBase64)||!apiKey||isStreaming)return;addBubble(text,'user',pendingImageBase64);input.value='';input.style.height='40px';input.placeholder='嗨！有什么想聊的吗？ 😊';const sendBtn=document.getElementById('sendBtn');sendBtn.disabled=true;isStreaming=true;const mem=getRelevantMemory(text);const sp=`${currentMode.prompt}\n\n${mem?`关于 Aaliyah 的记忆：\n${mem}`:''}`.trim();let msgs=[{role:'system',content:sp}];shortTermLog.slice(-(currentLimit*2)).forEach(m=>{if(m.image){msgs.push({role:m.role==='ai'?'assistant':'user',content:[{type:'text',text:m.content||'[图片]'},{type:'image_url',image_url:{url:m.image}}]});}else{msgs.push({role:m.role==='ai'?'assistant':'user',content:m.content});}});let uc=text;if(pendingImageBase64){uc=[{type:'text',text:text||'描述此图'},{type:'image_url',image_url:{url:pendingImageBase64}}];}msgs.push({role:'user',content:uc});shortTermLog.push({role:'user',content:text,image:pendingImageBase64});pendingImageBase64=null;const{row,bubble,contentDiv}=addBubble('','ai',null,true);let acc='';try{const resp=await fetch('https://openrouter.ai/api/v1/chat/completions',{method:'POST',headers:{'Authorization':`Bearer ${apiKey}`,'HTTP-Referer':'https://github.com','Content-Type':'application/json'},body:JSON.stringify({model:selectedModelId,messages:msgs,temperature:0.8,stream:true})});if(!resp.ok)throw new Error(`HTTP ${resp.status}`);const reader=resp.body.getReader();const dec=new TextDecoder();let buf='';while(true){const{done,value}=await reader.read();if(done)break;buf+=dec.decode(value,{stream:true});const lines=buf.split('\n');buf=lines.pop();for(const line of lines){if(!line.startsWith('data: '))continue;const d=line.slice(6).trim();if(d==='[DONE]')continue;try{const j=JSON.parse(d);const delta=j.choices?.[0]?.delta?.content||'';if(delta){acc+=delta;contentDiv.innerHTML=marked.parse(acc);document.getElementById('chat-flow').scrollTop=document.getElementById('chat-flow').scrollHeight;}if(j.usage)updateTokenDisplay(j.usage.total_tokens||0);}catch(e){}}}contentDiv.classList.remove('streaming-cursor');contentDiv.innerHTML=marked.parse(acc);const ctrl=document.createElement('div');ctrl.className='bubble-controls';ctrl.innerHTML=`<button class="ctrl-btn" onclick="regenerateLast()">↺ 再说一次</button><button class="ctrl-btn" onclick="openDocView(this)">📄 阅读视图</button>`;bubble.appendChild(ctrl);bubble._rawText=acc;shortTermLog.push({role:'ai',content:acc});localStorage.setItem(ST_KEY,JSON.stringify(shortTermLog));if(sessionTokens===0){const est=Math.ceil((sp.length+acc.length)/4);updateTokenDisplay(est);}}catch(e){contentDiv.classList.remove('streaming-cursor');contentDiv.textContent=`[哎呀出错了] ${e.message}`;shortTermLog.pop();}finally{sendBtn.disabled=false;isStreaming=false;}}

async function regenerateLast(){if(isStreaming)return;if(shortTermLog.length&&shortTermLog[shortTermLog.length-1].role==='ai'){shortTermLog.pop();localStorage.setItem(ST_KEY,JSON.stringify(shortTermLog));}const flow=document.getElementById('chat-flow');const rows=flow.querySelectorAll('.msg-row.ai');if(rows.length)rows[rows.length-1].remove();const last=shortTermLog[shortTermLog.length-1];if(!last)return;const input=document.getElementById('userInput');input.value=last.content;shortTermLog.pop();await sendMsg();}
function clearChat(){if(!confirm('清空对话？长期记忆不会消失哦～'))return;shortTermLog=[];localStorage.setItem(ST_KEY,JSON.stringify(shortTermLog));document.getElementById('chat-flow').innerHTML='';sessionTokens=0;updateTokenDisplay();addBubble(`好哒，重新开始！现在是【${currentMode.name}】模式 ✨`,'ai');}
async function archiveMD(){if(!shortTermLog.length)return alert('还没有对话可以归档哦～');const apiKey=getApiKey();if(!apiKey)return;if(!confirm('把对话整理存起来吗？'))return;const btn=document.querySelector('.btn-archive');btn.textContent='⏳ 整理中...';const rawText=shortTermLog.map(m=>`${m.role.toUpperCase()}: ${m.content}`).join('\n');const cp=`提取以下对话的核心信息，输出高密度 Markdown 笔记。要求：每条不超过30字，最多10条，格式为 ### ${new Date().toLocaleDateString()} 归档\n- 核心点\n\n对话内容：\n${rawText}`;try{const res=await fetch('https://openrouter.ai/api/v1/chat/completions',{method:'POST',headers:{'Authorization':`Bearer ${apiKey}`,'Content-Type':'application/json'},body:JSON.stringify({model:'google/gemini-2.0-flash-001',messages:[{role:'user',content:cp}],temperature:0.2})});const data=await res.json();const summary=data.choices[0].message.content;let lt=localStorage.getItem(LT_KEY)||`# Aaliyah 的长期知识库\n`;lt+=`\n${summary}\n`;localStorage.setItem(LT_KEY,lt);shortTermLog=[];localStorage.setItem(ST_KEY,JSON.stringify(shortTermLog));document.getElementById('chat-flow').innerHTML='';addBubble(`✅ 整理好啦！\n\n${summary}`,'ai');}catch(e){alert(`归档失败: ${e.message}`);}finally{btn.textContent='📦 归档对话';}}
function openDocView(btn){const bubble=btn.closest('.bubble');const rawText=bubble._rawText||'';const htmlContent=marked.parse(rawText);const overlay=document.createElement('div');overlay.className='doc-modal-overlay';const paper=document.createElement('div');paper.className='doc-paper';const closeBtn=document.createElement('button');closeBtn.textContent='✕ 关闭';closeBtn.className='no-print';closeBtn.style.cssText='position:sticky;top:0;float:right;padding:6px 12px;border:none;border-radius:8px;background:#f1f5f9;cursor:pointer;font-size:13px;margin-bottom:10px;';closeBtn.onclick=()=>overlay.remove();const printBtn=document.createElement('button');printBtn.textContent='🖨 打印';printBtn.className='no-print';printBtn.style.cssText='position:sticky;top:0;float:right;padding:6px 12px;border:none;border-radius:8px;background:#8B5CF6;color:white;cursor:pointer;font-size:13px;margin:0 8px 10px 0;';printBtn.onclick=()=>window.print();const content=document.createElement('div');content.innerHTML=htmlContent;paper.appendChild(closeBtn);paper.appendChild(printBtn);paper.appendChild(content);overlay.appendChild(paper);document.body.appendChild(overlay);overlay.onclick=e=>{if(e.target===overlay)overlay.remove();};}


let recognition,isRecording=false;
if('webkitSpeechRecognition'in window||'SpeechRecognition'in window){const SR=window.SpeechRecognition||window.webkitSpeechRecognition;recognition=new SR();recognition.lang='zh-CN';recognition.interimResults=false;recognition.onresult=e=>{document.getElementById('userInput').value+=e.results[0][0].transcript;toggleVoice();};recognition.onerror=()=>toggleVoice();recognition.onend=()=>{if(isRecording)toggleVoice();};}
function toggleVoice(){const btn=document.getElementById('voiceBtn');if(!recognition)return alert('浏览器不支持语音识别。');if(!isRecording){recognition.start();btn.classList.add('recording');isRecording=true;}else{recognition.stop();btn.classList.remove('recording');isRecording=false;}}
function handleImageUpload(event){const file=event.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=e=>{pendingImageBase64=e.target.result;document.getElementById('userInput').placeholder='[图片已就绪] 告诉我这是什么～';};reader.readAsDataURL(file);}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}}
function autoResize(el){el.style.height='40px';el.style.height=Math.min(el.scrollHeight,140)+'px';el.style.overflowY=el.scrollHeight>140?'auto':'hidden';}
init();
</script>
</body>
</html>
