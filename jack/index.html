<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jack · Private AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --accent: #2563EB;
            --accent-soft: #EFF6FF;
            --accent-mid: #93C5FD;
            --bg: #F0F4FF;
            --glass: rgba(255,255,255,0.72);
            --glass-border: rgba(255,255,255,0.9);
            --text: #0F172A;
            --text-soft: #64748B;
            --bubble-ai: rgba(255,255,255,0.88);
            --bubble-user: #2563EB;
            --sidebar-w: 260px;
            --header-h: 58px;
            --footer-h: 72px;
            --radius: 20px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'DM Sans', -apple-system, sans-serif;
            height: 100dvh;
            background: #0A1628;
            overflow: hidden;
            color: var(--text);
        }

        /* ── Background ── */
        .bg-canvas {
            position: fixed; inset: 0; z-index: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 10%, rgba(37,99,235,0.35) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 80% 80%, rgba(147,197,253,0.2) 0%, transparent 55%),
                radial-gradient(ellipse 40% 40% at 60% 30%, rgba(99,102,241,0.15) 0%, transparent 50%),
                linear-gradient(160deg, #0A1628 0%, #0F2044 50%, #0A1628 100%);
        }
        .bg-grid {
            position: fixed; inset: 0; z-index: 0; opacity: 0.04;
            background-image: linear-gradient(rgba(255,255,255,0.8) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255,255,255,0.8) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* ── Layout Shell ── */
        #app {
            position: relative; z-index: 1;
            height: 100dvh;
            display: flex;
        }

        /* ── Sidebar ── */
        #sidebar {
            width: var(--sidebar-w);
            height: 100%;
            background: rgba(10,22,40,0.85);
            backdrop-filter: blur(30px) saturate(180%);
            border-right: 1px solid rgba(37,99,235,0.2);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transition: transform 0.35s cubic-bezier(0.25,1,0.5,1);
            z-index: 50;
        }

        #sidebar.collapsed {
            transform: translateX(calc(-1 * var(--sidebar-w)));
            position: absolute;
        }

        .sidebar-header {
            padding: 20px 18px 14px;
            border-bottom: 1px solid rgba(37,99,235,0.15);
        }
        .user-identity {
            display: flex; align-items: center; gap: 10px;
        }
        .user-avatar {
            width: 36px; height: 36px; border-radius: 50%;
            background: linear-gradient(135deg, #2563EB, #60A5FA);
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 15px; color: white;
            box-shadow: 0 0 0 2px rgba(37,99,235,0.3);
        }
        .user-name { font-weight: 600; font-size: 15px; color: white; }
        .user-sub { font-size: 11px; color: rgba(255,255,255,0.4); font-family: 'DM Mono', monospace; }

        .sidebar-section {
            padding: 14px 12px 8px;
        }
        .sidebar-label {
            font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.3);
            letter-spacing: 0.12em; text-transform: uppercase;
            padding: 0 6px 8px;
        }

        /* Mode Cards */
        .mode-list { display: flex; flex-direction: column; gap: 4px; }
        .mode-card {
            display: flex; align-items: center; gap: 10px;
            padding: 9px 10px; border-radius: 12px;
            cursor: pointer; transition: all 0.2s;
            border: 1px solid transparent;
        }
        .mode-card:hover { background: rgba(37,99,235,0.12); }
        .mode-card.active {
            background: rgba(37,99,235,0.22);
            border-color: rgba(37,99,235,0.4);
        }
        .mode-icon {
            width: 30px; height: 30px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; flex-shrink: 0;
            background: rgba(255,255,255,0.07);
        }
        .mode-card.active .mode-icon { background: rgba(37,99,235,0.3); }
        .mode-info { min-width: 0; }
        .mode-name { font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.85); }
        .mode-desc { font-size: 11px; color: rgba(255,255,255,0.35); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Context slider */
        .context-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 6px;
        }
        .context-label { font-size: 12px; color: rgba(255,255,255,0.5); }
        .context-val { font-size: 12px; font-family: 'DM Mono', monospace; color: var(--accent-mid); }
        input[type="range"] {
            width: 100%; accent-color: var(--accent); margin: 4px 6px 0;
            height: 3px;
        }

        /* Token counter */
        .token-display {
            margin: 6px 12px;
            padding: 10px 12px;
            background: rgba(37,99,235,0.08);
            border: 1px solid rgba(37,99,235,0.15);
            border-radius: 12px;
        }
        .token-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px; }
        .token-key { font-size: 11px; color: rgba(255,255,255,0.35); }
        .token-num { font-size: 12px; font-family: 'DM Mono', monospace; color: var(--accent-mid); }
        .token-cost { font-size: 13px; font-weight: 600; color: #60A5FA; text-align: right; }

        /* Model picker */
        .model-section { padding: 8px 12px; }
        .model-search {
            width: 100%; padding: 7px 10px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; color: white; font-size: 12px;
            font-family: 'DM Sans', sans-serif;
            outline: none; margin-bottom: 6px;
        }
        .model-search::placeholder { color: rgba(255,255,255,0.3); }
        .model-list {
            max-height: 160px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 2px;
        }
        .model-list::-webkit-scrollbar { width: 3px; }
        .model-list::-webkit-scrollbar-track { background: transparent; }
        .model-list::-webkit-scrollbar-thumb { background: rgba(37,99,235,0.4); border-radius: 2px; }
        .model-tier { font-size: 9px; font-weight: 700; color: rgba(255,255,255,0.25); letter-spacing: 0.1em; text-transform: uppercase; padding: 6px 6px 2px; }
        .model-opt {
            padding: 7px 10px; border-radius: 8px;
            cursor: pointer; transition: background 0.15s;
            display: flex; justify-content: space-between; align-items: center;
        }
        .model-opt:hover { background: rgba(255,255,255,0.06); }
        .model-opt.selected { background: rgba(37,99,235,0.2); }
        .model-opt-name { font-size: 12px; color: rgba(255,255,255,0.75); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; }
        .model-opt-price { font-size: 10px; font-family: 'DM Mono', monospace; color: rgba(255,255,255,0.3); flex-shrink: 0; }
        .model-loading { font-size: 11px; color: rgba(255,255,255,0.3); text-align: center; padding: 12px; }

        /* Sidebar actions */
        .sidebar-actions {
            margin-top: auto;
            padding: 12px;
            display: flex; flex-direction: column; gap: 6px;
            border-top: 1px solid rgba(37,99,235,0.15);
        }
        .action-btn {
            display: flex; align-items: center; gap: 8px;
            padding: 9px 12px; border-radius: 10px;
            border: none; cursor: pointer; font-size: 13px;
            font-family: 'DM Sans', sans-serif; font-weight: 500;
            transition: all 0.2s; width: 100%; text-align: left;
        }
        .btn-archive { background: rgba(52,199,89,0.15); color: #4ADE80; border: 1px solid rgba(52,199,89,0.25); }
        .btn-archive:hover { background: rgba(52,199,89,0.25); }
        .btn-clear { background: rgba(255,59,48,0.1); color: #F87171; border: 1px solid rgba(255,59,48,0.2); }
        .btn-clear:hover { background: rgba(255,59,48,0.2); }
        .btn-back { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.5); border: 1px solid rgba(255,255,255,0.1); text-decoration: none; display: flex; align-items: center; gap: 8px; }
        .btn-back:hover { color: rgba(255,255,255,0.8); background: rgba(255,255,255,0.08); }

        /* ── Main Panel ── */
        #main {
            flex: 1; min-width: 0;
            display: flex; flex-direction: column;
            transition: margin-left 0.35s cubic-bezier(0.25,1,0.5,1);
        }

        /* ── Header ── */
        header {
            height: var(--header-h);
            display: flex; align-items: center;
            padding: 0 16px; gap: 12px;
            background: rgba(10,22,40,0.6);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(37,99,235,0.12);
            flex-shrink: 0;
        }
        .toggle-btn {
            width: 34px; height: 34px; border-radius: 10px;
            border: 1px solid rgba(37,99,235,0.25);
            background: rgba(37,99,235,0.1);
            color: rgba(255,255,255,0.7);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 14px; flex-shrink: 0;
            transition: all 0.2s;
        }
        .toggle-btn:hover { background: rgba(37,99,235,0.2); color: white; }

        .header-mode {
            display: flex; align-items: center; gap: 7px;
            padding: 5px 12px; border-radius: 20px;
            background: rgba(37,99,235,0.12);
            border: 1px solid rgba(37,99,235,0.25);
        }
        .header-mode-icon { font-size: 13px; }
        .header-mode-name { font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.8); }

        .header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
        .tts-btn {
            width: 30px; height: 30px; border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            background: transparent; color: rgba(255,255,255,0.4);
            cursor: pointer; font-size: 14px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .tts-btn.active { background: rgba(37,99,235,0.2); color: #60A5FA; border-color: rgba(37,99,235,0.4); }

        /* ── Chat Flow ── */
        #chat-flow {
            flex: 1; overflow-y: auto;
            padding: 24px 20px 16px;
            display: flex; flex-direction: column; gap: 14px;
            scroll-behavior: smooth;
        }
        #chat-flow::-webkit-scrollbar { width: 4px; }
        #chat-flow::-webkit-scrollbar-thumb { background: rgba(37,99,235,0.3); border-radius: 2px; }

        /* Bubbles */
        .msg-row {
            display: flex;
            animation: msgIn 0.3s cubic-bezier(0.25,1,0.5,1) both;
        }
        .msg-row.user { justify-content: flex-end; }
        .msg-row.ai { justify-content: flex-start; }

        @keyframes msgIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .bubble {
            max-width: min(78%, 640px);
            padding: 11px 15px;
            border-radius: 18px;
            font-size: 15px; line-height: 1.6;
            word-wrap: break-word; position: relative;
        }
        .msg-row.user .bubble {
            background: linear-gradient(135deg, #2563EB, #3B82F6);
            color: white;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 16px rgba(37,99,235,0.35);
        }
        .msg-row.ai .bubble {
            background: rgba(255,255,255,0.09);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.12);
            color: rgba(255,255,255,0.9);
            border-bottom-left-radius: 4px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
        }
        .bubble img { max-width: 100%; border-radius: 10px; margin-top: 8px; }

        /* AI bubble controls */
        .bubble-controls {
            display: flex; gap: 6px; margin-top: 8px;
            opacity: 0; transition: opacity 0.2s;
        }
        .msg-row.ai:hover .bubble-controls { opacity: 1; }
        .ctrl-btn {
            padding: 3px 8px; border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.4); font-size: 11px;
            cursor: pointer; transition: all 0.15s;
            font-family: 'DM Sans', sans-serif;
        }
        .ctrl-btn:hover { background: rgba(37,99,235,0.2); color: white; border-color: rgba(37,99,235,0.4); }

        /* Markdown inside AI bubble */
        .bubble p { margin: 0; }
        .bubble p + p { margin-top: 8px; }
        .bubble h1, .bubble h2, .bubble h3 { color: white; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 4px; margin: 12px 0 6px; font-size: 15px; }
        .bubble ul, .bubble ol { padding-left: 18px; margin: 6px 0; }
        .bubble li { margin-bottom: 3px; }
        .bubble code { font-family: 'DM Mono', monospace; font-size: 12px; background: rgba(0,0,0,0.25); padding: 1px 5px; border-radius: 4px; }
        .bubble pre { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 10px; overflow-x: auto; margin: 8px 0; }
        .bubble pre code { background: none; padding: 0; }
        .bubble table { border-collapse: collapse; width: 100%; margin: 8px 0; font-size: 13px; display: block; overflow-x: auto; }
        .bubble th, .bubble td { border: 1px solid rgba(255,255,255,0.1); padding: 6px 10px; }
        .bubble th { background: rgba(37,99,235,0.2); }
        .bubble strong { color: #93C5FD; }

        /* Cursor blink for streaming */
        .streaming-cursor::after {
            content: '▋';
            animation: blink 0.8s step-end infinite;
            color: #60A5FA;
        }
        @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }

        /* ── Footer ── */
        footer {
            padding: 12px 16px;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
            background: rgba(10,22,40,0.75);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(37,99,235,0.12);
            flex-shrink: 0;
        }
        .input-row { display: flex; gap: 8px; align-items: flex-end; }
        .icon-btn {
            width: 38px; height: 38px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.5); font-size: 16px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s; flex-shrink: 0;
        }
        .icon-btn:hover { background: rgba(37,99,235,0.2); color: white; border-color: rgba(37,99,235,0.3); }
        .icon-btn.recording { background: #EF4444; border-color: #EF4444; color: white; animation: pulse 1.2s ease infinite; }
        @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.5); } 50% { box-shadow: 0 0 0 8px rgba(239,68,68,0); } }

        #userInput {
            flex: 1; min-width: 0;
            padding: 10px 14px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 14px; color: white; font-size: 15px;
            font-family: 'DM Sans', sans-serif;
            outline: none; resize: none;
            max-height: 140px; min-height: 38px; height: 38px;
            line-height: 1.5; overflow-y: hidden;
            transition: border-color 0.2s;
        }
        #userInput:focus { border-color: rgba(37,99,235,0.5); }
        #userInput::placeholder { color: rgba(255,255,255,0.25); }

        .btn-send {
            width: 38px; height: 38px; border-radius: 12px;
            border: none; background: #2563EB; color: white;
            font-size: 16px; cursor: pointer; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(37,99,235,0.4);
        }
        .btn-send:hover { background: #3B82F6; transform: scale(1.05); }
        .btn-send:disabled { opacity: 0.4; transform: none; cursor: not-allowed; }

        input[type="file"] { display: none; }

        /* A4 Doc Modal */
        .doc-modal-overlay {
            position: fixed; inset: 0; z-index: 9999;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(12px);
            display: flex; justify-content: center; align-items: flex-start;
            overflow-y: auto; -webkit-overflow-scrolling: touch;
        }
        .doc-paper {
            background: #fff; color: #1a1a1a;
            width: 90%; max-width: 820px;
            margin: 60px auto;
            min-height: calc(100vh - 120px);
            padding: 8% 10%;
            box-shadow: 0 25px 60px rgba(0,0,0,0.6);
            border-radius: 4px;
            font-family: ui-serif, Georgia, serif;
            line-height: 1.85; font-size: 17px; position: relative;
        }
        .doc-paper * { color: inherit; }
        .doc-paper p { margin-bottom: 1.2em; text-align: justify; }
        .doc-paper h1,.doc-paper h2,.doc-paper h3 { color:#000!important; border-bottom:1px solid #eee; padding-bottom:6px; margin-top:1.6em; font-family:ui-sans-serif,system-ui,sans-serif; }
        .doc-paper table { width:100%; border-collapse:collapse; margin:1.5em 0; font-size:14px; }
        .doc-paper th,.doc-paper td { border:1px solid #d1d5db!important; padding:10px 14px!important; background:#fff!important; color:#1a1a1a!important; }
        .doc-paper th { background:#f9fafb!important; font-weight:700; }
        @media print {
            body * { visibility:hidden; }
            .doc-paper,.doc-paper * { visibility:visible; }
            .doc-paper { position:absolute;left:0;top:0;margin:0;padding:0;box-shadow:none;width:100%;max-width:100%; }
            .no-print { display:none!important; }
        }

        /* Overlay when sidebar open on mobile */
        .sidebar-overlay {
            display: none;
            position: fixed; inset: 0; z-index: 40;
            background: rgba(0,0,0,0.4);
        }
        .sidebar-overlay.visible { display: block; }

        /* ── Responsive ── */

        /* 平板竖屏及以下：侧边栏收起，覆盖式弹出 */
        @media (max-width: 900px) {
            :root { --sidebar-w: 280px; }
            #sidebar {
                position: absolute; height: 100%;
            }
            #sidebar:not(.collapsed) ~ .sidebar-overlay { display: block; }
        }

        /* 手机：全面优化布局 */
        @media (max-width: 640px) {
            :root { --sidebar-w: 85vw; }

            #sidebar { position: absolute; height: 100%; max-width: 320px; }

            /* 气泡最大宽度放宽 */
            .bubble { max-width: 90%; font-size: 14px; padding: 10px 13px; }

            /* header 紧凑 */
            header { padding: 0 10px; gap: 8px; height: 52px; }
            .header-mode { padding: 4px 10px; }
            .header-mode-name { font-size: 12px; }

            /* 输入区 */
            footer { padding: 8px 10px; padding-bottom: max(8px, env(safe-area-inset-bottom)); }
            .input-row { gap: 6px; }
            .icon-btn { width: 34px; height: 34px; font-size: 14px; }
            .btn-send { width: 34px; height: 34px; font-size: 14px; }
            #userInput { font-size: 14px; padding: 8px 12px; min-height: 34px; height: 34px; }

            /* 聊天区域 */
            #chat-flow { padding: 14px 12px 10px; gap: 10px; }

            /* 侧边栏内部 */
            .model-list { max-height: 120px; }
            .token-display { margin: 4px 10px; padding: 8px 10px; }
        }

        /* 极小屏（320px 以下） */
        @media (max-width: 360px) {
            .bubble { max-width: 95%; font-size: 13px; }
            .header-mode-name { display: none; }
        }

        /* 大屏优化：超宽屏限制气泡最大宽度 */
        @media (min-width: 1200px) {
            #chat-flow { padding: 24px 10% 16px; }
        }

        /* 高度不足时（横屏手机）*/
        @media (max-height: 500px) {
            header { height: 46px; }
            #chat-flow { padding: 8px 14px; gap: 8px; }
            footer { padding: 6px 14px; padding-bottom: max(6px, env(safe-area-inset-bottom)); }
            .bubble { font-size: 13px; padding: 8px 12px; }
            .sidebar-section { padding: 8px 10px 4px; }
            .mode-card { padding: 6px 8px; }
            .model-list { max-height: 80px; }
            .token-display { display: none; }
        }
    </style>
</head>
<body>
<div class="bg-canvas"></div>
<div class="bg-grid"></div>

<div id="app">
    <!-- Sidebar -->
    <div id="sidebar">
        <div class="sidebar-header">
            <div class="user-identity">
                <div class="user-avatar">J</div>
                <div>
                    <div class="user-name">Jack</div>
                    <div class="user-sub">private · ai · hub</div>
                </div>
            </div>
        </div>

        <!-- Mode Cards -->
        <div class="sidebar-section">
            <div class="sidebar-label">模式</div>
            <div class="mode-list" id="modeList"></div>
        </div>

        <!-- Context Window -->
        <div class="sidebar-section">
            <div class="sidebar-label">上下文深度</div>
            <div class="context-row">
                <span class="context-label">保留轮次</span>
                <span class="context-val" id="ctxVal">5</span>
            </div>
            <input type="range" min="2" max="20" value="5" id="ctxSlider" oninput="updateCtx(this.value)">
        </div>

        <!-- Token Display -->
        <div class="token-display">
            <div class="token-row">
                <span class="token-key">本次 tokens</span>
                <span class="token-num" id="tokSession">0</span>
            </div>
            <div class="token-row">
                <span class="token-key">累计消耗</span>
                <span class="token-num" id="tokTotal">0</span>
            </div>
            <div class="token-cost" id="costDisplay">≈ $0.0000</div>
        </div>

        <!-- Model Picker -->
        <div class="model-section">
            <div class="sidebar-label" style="padding: 0 0 6px;">模型</div>
            <input type="text" class="model-search" id="modelSearch" placeholder="搜索模型..." oninput="filterModels(this.value)">
            <div class="model-list" id="modelList">
                <div class="model-loading">加载中...</div>
            </div>
        </div>

        <!-- Actions -->
        <div class="sidebar-actions">
            <button class="action-btn btn-archive" onclick="archiveMD()">📦 归档对话</button>
            <button class="action-btn btn-clear" onclick="clearChat()">🗑️ 清空对话</button>
            <a href="../index.html" class="action-btn btn-back">← 返回大门</a>
        </div>
    </div>

    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

    <!-- Main -->
    <div id="main">
        <header>
            <button class="toggle-btn" onclick="toggleSidebar()">☰</button>
            <div class="header-mode" id="headerMode">
                <span class="header-mode-icon">🎓</span>
                <span class="header-mode-name">学术模式</span>
            </div>
            <div class="header-right"></div>
        </header>

        <div id="chat-flow"></div>

        <footer>
            <div class="input-row">
                <button class="icon-btn" onclick="document.getElementById('imageInput').click()" title="上传图片">📎</button>
                <input type="file" id="imageInput" accept="image/*" onchange="handleImageUpload(event)">
                <button class="icon-btn" id="voiceBtn" onclick="toggleVoice()" title="语音输入">🎤</button>
                <textarea id="userInput" rows="1" placeholder="输入想法，或记录进展..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
                <button class="btn-send" id="sendBtn" onclick="sendMsg()">↑</button>
            </div>
        </footer>
    </div>
</div>

<script>
// ─────────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────────
const currentUser = 'Jack';
const ST_KEY = `MEM_Jack_ST`;
const LT_KEY = `MEM_Jack_LT`;
const API_KEY_STORE = `OR_API_KEY`;
const TOK_TOTAL_KEY = `TOK_TOTAL_Jack`;
const LAST_MODEL_KEY = `LAST_MODEL_Jack`;

const MODES = [
    {
        id: 'academic',
        icon: '🎓',
        name: '学术',
        desc: '论文·研究·严谨分析',
        prompt: `你是 Jack 的学术研究助手，专精运动科学与脑震荡研究。回复要严谨、引用准确，遇到研究设计问题要主动提出方法论建议。语言简洁，不废话。`
    },
    {
        id: 'journal',
        icon: '📓',
        name: '日记',
        desc: '记录·反思·整理思绪',
        prompt: `你是 Jack 的私人日记助手。帮他记录和整理每天的想法、进展和感受。语气温暖，引导他深入思考，适当提出洞察。不要过于正式。`
    },
    {
        id: 'brainstorm',
        icon: '⚡',
        name: '脑暴',
        desc: '发散·创意·快速迭代',
        prompt: `你是 Jack 的创意搭档。进入快速发散模式：多给选项，不评判想法好坏，用列表和关键词，鼓励跳跃性思维。每次回复结尾提一个意想不到的角度。`
    },
    {
        id: 'mentor',
        icon: '🧭',
        name: '导师',
        desc: '决策·规划·深度引导',
        prompt: `你是 Jack 的私人导师，有丰富的学术和商业经验。面对决策和规划问题，帮他分析利弊，提供具体可执行的建议，必要时反问以引导他自己思考出答案。`
    }
];

let currentMode = MODES[0];
let currentLimit = 5;
let shortTermLog = JSON.parse(localStorage.getItem(ST_KEY) || '[]');
let pendingImageBase64 = null;
let allModels = [];
let selectedModelId = localStorage.getItem(LAST_MODEL_KEY) || 'anthropic/claude-sonnet-4-5';
let sessionTokens = 0;
let totalTokens = parseInt(localStorage.getItem(TOK_TOTAL_KEY) || '0');
let isStreaming = false;

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
function init() {
    renderModes();
    loadModels();
    renderHistory();
    updateTokenDisplay();
    addBubble(`你好，Jack ✦\n当前模式：${currentMode.name}`, 'ai');
}

// ─────────────────────────────────────────────
// SIDEBAR
// ─────────────────────────────────────────────
let sidebarOpen = window.innerWidth > 640;

function toggleSidebar() {
    sidebarOpen = !sidebarOpen;
    updateSidebarState();
}
function closeSidebar() {
    sidebarOpen = false;
    updateSidebarState();
}
function updateSidebarState() {
    const sb = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    if (sidebarOpen) {
        sb.classList.remove('collapsed');
        if (window.innerWidth <= 640) overlay.classList.add('visible');
    } else {
        sb.classList.add('collapsed');
        overlay.classList.remove('visible');
    }
}
if (window.innerWidth <= 640) {
    document.getElementById('sidebar').classList.add('collapsed');
    sidebarOpen = false;
}

// ─────────────────────────────────────────────
// MODES
// ─────────────────────────────────────────────
function renderModes() {
    const list = document.getElementById('modeList');
    list.innerHTML = '';
    MODES.forEach(mode => {
        const card = document.createElement('div');
        card.className = 'mode-card' + (mode.id === currentMode.id ? ' active' : '');
        card.innerHTML = `<div class="mode-icon">${mode.icon}</div>
            <div class="mode-info">
                <div class="mode-name">${mode.name}</div>
                <div class="mode-desc">${mode.desc}</div>
            </div>`;
        card.onclick = () => setMode(mode);
        list.appendChild(card);
    });
}

function setMode(mode) {
    currentMode = mode;
    renderModes();
    document.getElementById('headerMode').innerHTML = `
        <span class="header-mode-icon">${mode.icon}</span>
        <span class="header-mode-name">${mode.name}模式</span>`;
    if (window.innerWidth <= 640) closeSidebar();
}

// ─────────────────────────────────────────────
// MODELS — Dynamic from OpenRouter
// ─────────────────────────────────────────────
async function loadModels() {
    const apiKey = getApiKey(false);
    if (!apiKey) {
        renderFallbackModels();
        return;
    }
    try {
        const res = await fetch('https://openrouter.ai/api/v1/models', {
            headers: { 'Authorization': `Bearer ${apiKey}` }
        });
        const data = await res.json();
        if (!data.data) { renderFallbackModels(); return; }

        // Sort and categorize
        allModels = data.data
            .filter(m => m.pricing && m.id)
            .map(m => {
                const price = parseFloat(m.pricing.prompt || 0) * 1e6;
                let tier = price === 0 ? 'free' : price < 0.5 ? 'cheap' : price < 3 ? 'mid' : 'premium';
                return { id: m.id, name: m.name || m.id, price, tier };
            })
            .sort((a, b) => a.price - b.price);

        renderModelList(allModels);
    } catch(e) {
        renderFallbackModels();
    }
}

function renderFallbackModels() {
    allModels = [
        { id: 'anthropic/claude-sonnet-4-5', name: 'Claude Sonnet 4.5', price: 3, tier: 'mid' },
        { id: 'anthropic/claude-3.5-haiku', name: 'Claude 3.5 Haiku', price: 0.8, tier: 'cheap' },
        { id: 'google/gemini-2.5-flash', name: 'Gemini 2.5 Flash', price: 0.15, tier: 'cheap' },
        { id: 'google/gemini-2.0-flash-001', name: 'Gemini 2.0 Flash', price: 0.1, tier: 'cheap' },
        { id: 'openai/gpt-4o-mini', name: 'GPT-4o Mini', price: 0.15, tier: 'cheap' },
        { id: 'openai/gpt-4o', name: 'GPT-4o', price: 2.5, tier: 'mid' },
        { id: 'meta-llama/llama-3.3-70b-instruct', name: 'Llama 3.3 70B', price: 0.12, tier: 'cheap' },
        { id: 'anthropic/claude-opus-4', name: 'Claude Opus 4', price: 15, tier: 'premium' },
    ];
    renderModelList(allModels);
}

function renderModelList(models) {
    const list = document.getElementById('modelList');
    list.innerHTML = '';
    const tiers = [
        { key: 'free', label: '免费' },
        { key: 'cheap', label: '经济' },
        { key: 'mid', label: '旗舰' },
        { key: 'premium', label: '顶级' }
    ];
    tiers.forEach(({ key, label }) => {
        const group = models.filter(m => m.tier === key);
        if (!group.length) return;
        const tierEl = document.createElement('div');
        tierEl.className = 'model-tier';
        tierEl.textContent = label;
        list.appendChild(tierEl);
        group.slice(0, 15).forEach(m => {
            const opt = document.createElement('div');
            opt.className = 'model-opt' + (m.id === selectedModelId ? ' selected' : '');
            opt.dataset.id = m.id;
            const priceStr = m.price === 0 ? 'free' : `$${m.price.toFixed(2)}/M`;
            opt.innerHTML = `<span class="model-opt-name">${m.name}</span><span class="model-opt-price">${priceStr}</span>`;
            opt.onclick = () => selectModel(m.id);
            list.appendChild(opt);
        });
    });
}

function filterModels(q) {
    const filtered = q ? allModels.filter(m => m.name.toLowerCase().includes(q.toLowerCase()) || m.id.toLowerCase().includes(q.toLowerCase())) : allModels;
    renderModelList(filtered);
}

function selectModel(id) {
    selectedModelId = id;
    localStorage.setItem(LAST_MODEL_KEY, id);
    document.querySelectorAll('.model-opt').forEach(el => {
        el.classList.toggle('selected', el.dataset.id === id);
    });
}

// ─────────────────────────────────────────────
// CONTEXT
// ─────────────────────────────────────────────
function updateCtx(val) {
    currentLimit = parseInt(val);
    document.getElementById('ctxVal').textContent = val;
}

// ─────────────────────────────────────────────
// TOKEN DISPLAY
// ─────────────────────────────────────────────
function updateTokenDisplay(sessionDelta = 0) {
    sessionTokens += sessionDelta;
    totalTokens += sessionDelta;
    localStorage.setItem(TOK_TOTAL_KEY, totalTokens);

    document.getElementById('tokSession').textContent = sessionTokens.toLocaleString();
    document.getElementById('tokTotal').textContent = totalTokens.toLocaleString();

    // rough cost estimate based on selected model
    const model = allModels.find(m => m.id === selectedModelId);
    const pricePerM = model ? model.price : 3;
    const cost = (totalTokens / 1e6) * pricePerM;
    document.getElementById('costDisplay').textContent = `≈ $${cost.toFixed(4)}`;
}

// ─────────────────────────────────────────────
// BUBBLES
// ─────────────────────────────────────────────
function addBubble(text, role, imageBase64 = null, streaming = false) {
    const flow = document.getElementById('chat-flow');
    const row = document.createElement('div');
    row.className = `msg-row ${role}`;

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    if (imageBase64) {
        const img = document.createElement('img');
        img.src = imageBase64;
        bubble.appendChild(img);
    }

    const contentDiv = document.createElement('div');
    contentDiv.className = role === 'ai' ? 'bubble-md' : '';
    if (role === 'ai' && !streaming) {
        contentDiv.innerHTML = marked.parse(text || '');
    } else {
        contentDiv.textContent = text || '';
    }
    if (streaming) contentDiv.classList.add('streaming-cursor');
    bubble.appendChild(contentDiv);

    // Controls for AI bubbles
    if (role === 'ai' && !streaming) {
        const controls = document.createElement('div');
        controls.className = 'bubble-controls';
        controls.innerHTML = `
            <button class="ctrl-btn" onclick="regenerateLast()">↺ 重新生成</button>
            <button class="ctrl-btn" onclick="openDocView(this)">📄 阅读视图</button>`;
        bubble.appendChild(controls);
        bubble._rawText = text;
    }

    row.appendChild(bubble);
    flow.appendChild(row);
    flow.scrollTop = flow.scrollHeight;
    return { row, bubble, contentDiv };
}

function renderHistory() {
    const recent = shortTermLog.slice(-(currentLimit * 2));
    recent.forEach(m => addBubble(m.content, m.role, m.image));
}

// ─────────────────────────────────────────────
// API KEY
// ─────────────────────────────────────────────
function getApiKey(prompt_if_missing = true) {
    let key = sessionStorage.getItem(API_KEY_STORE) || localStorage.getItem(API_KEY_STORE);
    if (!key && prompt_if_missing) {
        key = prompt(`欢迎，Jack。\n请输入 OpenRouter API Key：`);
        if (key) {
            sessionStorage.setItem(API_KEY_STORE, key.trim());
            localStorage.setItem(API_KEY_STORE, key.trim());
        }
    }
    return key;
}

// ─────────────────────────────────────────────
// MEMORY — Smart injection
// ─────────────────────────────────────────────
function getRelevantMemory(userText) {
    const longTermMD = localStorage.getItem(LT_KEY) || '';
    if (!longTermMD) return '';

    const sections = longTermMD.split(/(?=###)/);
    const keywords = userText.toLowerCase().split(/\s+/).filter(w => w.length > 2);

    const relevant = sections.filter(section => {
        const lower = section.toLowerCase();
        return keywords.some(kw => lower.includes(kw));
    });

    const selected = relevant.length > 0 ? relevant.slice(0, 3) : sections.slice(-2);
    return selected.join('\n').slice(0, 1500); // cap at 1500 chars
}

// ─────────────────────────────────────────────
// SEND MESSAGE — Streaming
// ─────────────────────────────────────────────
async function sendMsg() {
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    const apiKey = getApiKey();
    if ((!text && !pendingImageBase64) || !apiKey || isStreaming) return;

    addBubble(text, 'user', pendingImageBase64);
    input.value = '';
    input.style.height = '38px';
    input.placeholder = '输入想法，或记录进展...';

    const sendBtn = document.getElementById('sendBtn');
    sendBtn.disabled = true;
    isStreaming = true;

    const relevantMemory = getRelevantMemory(text);
    const systemPrompt = `${currentMode.prompt}\n\n${relevantMemory ? `相关记忆：\n${relevantMemory}` : ''}`.trim();

    let apiMessages = [{ role: 'system', content: systemPrompt }];

    const contextLog = shortTermLog.slice(-(currentLimit * 2));
    contextLog.forEach(msg => {
        if (msg.image) {
            apiMessages.push({ role: msg.role === 'ai' ? 'assistant' : 'user', content: [
                { type: 'text', text: msg.content || '[图片]' },
                { type: 'image_url', image_url: { url: msg.image } }
            ]});
        } else {
            apiMessages.push({ role: msg.role === 'ai' ? 'assistant' : 'user', content: msg.content });
        }
    });

    let userContent = text;
    if (pendingImageBase64) {
        userContent = [
            { type: 'text', text: text || '描述此图' },
            { type: 'image_url', image_url: { url: pendingImageBase64 } }
        ];
    }
    apiMessages.push({ role: 'user', content: userContent });

    shortTermLog.push({ role: 'user', content: text, image: pendingImageBase64 });
    pendingImageBase64 = null;

    // Create streaming bubble
    const { row, bubble, contentDiv } = addBubble('', 'ai', null, true);
    let accumulated = '';

    try {
        const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${apiKey}`,
                'HTTP-Referer': 'https://github.com',
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                model: selectedModelId,
                messages: apiMessages,
                temperature: 0.7,
                stream: true
            })
        });

        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop();

            for (const line of lines) {
                if (!line.startsWith('data: ')) continue;
                const data = line.slice(6).trim();
                if (data === '[DONE]') continue;
                try {
                    const json = JSON.parse(data);
                    const delta = json.choices?.[0]?.delta?.content || '';
                    if (delta) {
                        accumulated += delta;
                        contentDiv.innerHTML = marked.parse(accumulated);
                        document.getElementById('chat-flow').scrollTop = document.getElementById('chat-flow').scrollHeight;
                    }
                    // Token usage if available
                    if (json.usage) {
                        updateTokenDisplay(json.usage.total_tokens || 0);
                    }
                } catch(e) {}
            }
        }

        contentDiv.classList.remove('streaming-cursor');
        contentDiv.innerHTML = marked.parse(accumulated);

        // Add controls
        const controls = document.createElement('div');
        controls.className = 'bubble-controls';
        controls.innerHTML = `
            <button class="ctrl-btn" onclick="regenerateLast()">↺ 重新生成</button>
            <button class="ctrl-btn" onclick="openDocView(this)">📄 阅读视图</button>`;
        bubble.appendChild(controls);
        bubble._rawText = accumulated;

        shortTermLog.push({ role: 'ai', content: accumulated });
        localStorage.setItem(ST_KEY, JSON.stringify(shortTermLog));

        // Estimate tokens if not returned
        if (sessionTokens === 0) {
            const est = Math.ceil((systemPrompt.length + accumulated.length) / 4);
            updateTokenDisplay(est);
        }

        // TTS disabled

    } catch(error) {
        contentDiv.classList.remove('streaming-cursor');
        contentDiv.textContent = `[错误] ${error.message}`;
        shortTermLog.pop();
    } finally {
        sendBtn.disabled = false;
        isStreaming = false;
    }
}

// ─────────────────────────────────────────────
// REGENERATE
// ─────────────────────────────────────────────
async function regenerateLast() {
    if (isStreaming) return;
    // Remove last AI message
    if (shortTermLog.length && shortTermLog[shortTermLog.length - 1].role === 'ai') {
        shortTermLog.pop();
        localStorage.setItem(ST_KEY, JSON.stringify(shortTermLog));
    }
    // Remove last AI bubble from DOM
    const flow = document.getElementById('chat-flow');
    const rows = flow.querySelectorAll('.msg-row.ai');
    if (rows.length) rows[rows.length - 1].remove();

    // Re-send
    const lastUser = shortTermLog[shortTermLog.length - 1];
    if (!lastUser) return;

    // Temporarily put the user message back and trigger send
    const input = document.getElementById('userInput');
    input.value = lastUser.content;
    shortTermLog.pop();
    await sendMsg();
}

// ─────────────────────────────────────────────
// CLEAR
// ─────────────────────────────────────────────
function clearChat() {
    if (!confirm('清空当前对话？长期记忆不受影响。')) return;
    shortTermLog = [];
    localStorage.setItem(ST_KEY, JSON.stringify(shortTermLog));
    const flow = document.getElementById('chat-flow');
    flow.innerHTML = '';
    sessionTokens = 0;
    updateTokenDisplay();
    addBubble(`已清空。当前模式：${currentMode.name}`, 'ai');
}

// ─────────────────────────────────────────────
// ARCHIVE
// ─────────────────────────────────────────────
async function archiveMD() {
    if (!shortTermLog.length) return alert('没有对话可归档。');
    const apiKey = getApiKey();
    if (!apiKey) return;
    if (!confirm('将当前对话压缩归档到长期记忆？')) return;

    const btn = document.querySelector('.btn-archive');
    btn.textContent = '⏳ 归档中...';

    const rawText = shortTermLog.map(m => `${m.role.toUpperCase()}: ${m.content}`).join('\n');
    const compressPrompt = `提取以下对话的核心信息，输出高密度 Markdown 笔记。
要求：每条不超过30字，最多10条，格式为 ### ${new Date().toLocaleDateString()} 归档\n- 核心点

对话内容：\n${rawText}`;

    try {
        const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${apiKey}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ model: 'google/gemini-2.0-flash-001', messages: [{ role: 'user', content: compressPrompt }], temperature: 0.2 })
        });
        const data = await res.json();
        const summary = data.choices[0].message.content;

        let ltMD = localStorage.getItem(LT_KEY) || `# Jack 的长期知识库\n`;
        ltMD += `\n${summary}\n`;
        localStorage.setItem(LT_KEY, ltMD);

        shortTermLog = [];
        localStorage.setItem(ST_KEY, JSON.stringify(shortTermLog));

        const flow = document.getElementById('chat-flow');
        flow.innerHTML = '';
        addBubble(`✅ 归档完成\n\n${summary}`, 'ai');
    } catch(e) {
        alert(`归档失败: ${e.message}`);
    } finally {
        btn.textContent = '📦 归档对话';
    }
}

// ─────────────────────────────────────────────
// DOC VIEW
// ─────────────────────────────────────────────
function openDocView(btn) {
    const bubble = btn.closest('.bubble');
    const rawText = bubble._rawText || '';
    const htmlContent = marked.parse(rawText);

    const overlay = document.createElement('div');
    overlay.className = 'doc-modal-overlay';

    const paper = document.createElement('div');
    paper.className = 'doc-paper';

    const closeBtn = document.createElement('button');
    closeBtn.textContent = '✕ 关闭';
    closeBtn.className = 'no-print';
    closeBtn.style.cssText = 'position:sticky;top:0;float:right;padding:6px 12px;border:none;border-radius:8px;background:#f1f5f9;cursor:pointer;font-size:13px;margin-bottom:10px;';
    closeBtn.onclick = () => overlay.remove();

    const printBtn = document.createElement('button');
    printBtn.textContent = '🖨 打印';
    printBtn.className = 'no-print';
    printBtn.style.cssText = 'position:sticky;top:0;float:right;padding:6px 12px;border:none;border-radius:8px;background:#2563EB;color:white;cursor:pointer;font-size:13px;margin:0 8px 10px 0;';
    printBtn.onclick = () => window.print();

    const content = document.createElement('div');
    content.innerHTML = htmlContent;

    paper.appendChild(closeBtn);
    paper.appendChild(printBtn);
    paper.appendChild(content);
    overlay.appendChild(paper);
    document.body.appendChild(overlay);
    overlay.onclick = e => { if (e.target === overlay) overlay.remove(); };
}

// ─────────────────────────────────────────────
// VOICE INPUT
// ─────────────────────────────────────────────
let recognition, isRecording = false;
if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SR();
    recognition.lang = 'zh-CN';
    recognition.interimResults = false;
    recognition.onresult = e => {
        document.getElementById('userInput').value += e.results[0][0].transcript;
        toggleVoice();
    };
    recognition.onerror = () => toggleVoice();
    recognition.onend = () => { if (isRecording) toggleVoice(); };
}
function toggleVoice() {
    const btn = document.getElementById('voiceBtn');
    if (!recognition) return alert('浏览器不支持语音识别。');
    if (!isRecording) { recognition.start(); btn.classList.add('recording'); isRecording = true; }
    else { recognition.stop(); btn.classList.remove('recording'); isRecording = false; }
}

// ─────────────────────────────────────────────
// IMAGE
// ─────────────────────────────────────────────
function handleImageUpload(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
        pendingImageBase64 = e.target.result;
        document.getElementById('userInput').placeholder = '[图片已就绪] 请输入说明...';
    };
    reader.readAsDataURL(file);
}

// ─────────────────────────────────────────────
// INPUT

function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMsg();
    }
}
function autoResize(el) {
    el.style.height = '38px';
    el.style.height = Math.min(el.scrollHeight, 140) + 'px';
    el.style.overflowY = el.scrollHeight > 140 ? 'auto' : 'hidden';
}
